worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Docker's embedded DNS. Using a resolver + variables in proxy_pass forces
    # nginx to re-resolve service IPs at request time, so it never serves traffic
    # to a stale IP after a service container restarts. (Fixes "API drops after
    # a restart" — the root cause of intermittent "no data".)
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;
        client_max_body_size 20M;

        set $svc_auth    auth;
        set $svc_vendor  vendor;
        set $svc_catalog catalog;

        location = /healthz {
            access_log off;
            return 200 "gateway ok\n";
            add_header Content-Type text/plain;
        }

        location /media/ {
            alias /var/www/media/;
            expires 7d;
            access_log off;
            add_header Cache-Control "public";
        }

        # ---- Real-time product feed (WebSocket) ----
        location /ws/ {
            proxy_pass         http://$svc_catalog:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ---- Auth ----
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://$svc_auth:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Global site settings (vendor service) ----
        location /api/v1/site/ {
            proxy_pass         http://$svc_vendor:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ---- Vendor / Store ----
        location /api/v1/vendors/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://$svc_vendor:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Catalog ----
        location /api/v1/catalog/ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass         http://$svc_catalog:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Per-service API docs (dev convenience) ----
        location /api/docs/auth/ {
            rewrite ^/api/docs/auth/(.*)$ /api/docs/$1 break;
            proxy_pass http://$svc_auth:8000;
            proxy_set_header Host $host;
        }
        location /api/docs/vendor/ {
            rewrite ^/api/docs/vendor/(.*)$ /api/docs/$1 break;
            proxy_pass http://$svc_vendor:8000;
            proxy_set_header Host $host;
        }
        location /api/docs/catalog/ {
            rewrite ^/api/docs/catalog/(.*)$ /api/docs/$1 break;
            proxy_pass http://$svc_catalog:8000;
            proxy_set_header Host $host;
        }
    }
}
