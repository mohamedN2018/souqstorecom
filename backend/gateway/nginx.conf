worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ---- Rate limiting (basic DoS / abuse protection at the edge) ----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # ---- Upstreams: one per microservice ----
    upstream auth_service    { server auth:8000; }
    upstream vendor_service  { server vendor:8000; }
    upstream catalog_service { server catalog:8000; }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        location = /healthz {
            access_log off;
            return 200 "gateway ok\n";
            add_header Content-Type text/plain;
        }

        # ---- Locally-generated product/store images (fully offline) ----
        location /media/ {
            alias /var/www/media/;
            expires 7d;
            access_log off;
            add_header Cache-Control "public";
        }

        # ---- Auth / Identity service ----
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Vendor / Store service ----
        location /api/v1/vendors/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://vendor_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Catalog service ----
        location /api/v1/catalog/ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass         http://catalog_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Per-service API docs (dev convenience) ----
        location /api/docs/auth/    { proxy_pass http://auth_service/api/docs/;    proxy_set_header Host $host; }
        location /api/docs/vendor/  { proxy_pass http://vendor_service/api/docs/;  proxy_set_header Host $host; }
        location /api/docs/catalog/ { proxy_pass http://catalog_service/api/docs/; proxy_set_header Host $host; }
    }
}
