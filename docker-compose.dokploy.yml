# ============================================================
# SouqStore — PRODUCTION stack for Dokploy
# ------------------------------------------------------------
# One public domain (${DOMAIN}) → the storefront, which internally proxies
# /api, /ws and /media to the gateway. Everything else stays private.
#
# In Dokploy:
#   1. Create a "Compose" service pointing at this file.
#   2. Set the environment variables (see .env.dokploy.example).
#   3. Point your domain's DNS A-record at the Dokploy server.
#   4. Deploy. Then run ./dokploy/init.sh once to migrate + seed.
# ============================================================

services:
  # ---------------- public storefront (Traefik-routed) ----------------
  web:
    build:
      context: ./frontend/storefront
      dockerfile: Dockerfile.prod
    depends_on: [gateway]
    restart: unless-stopped
    networks: [souq-net, dokploy-network]
    # The site (path "/") is routed by Dokploy's "Domains" tab → web:80.
    # BUT another app on the same Traefik claims a broad `/api` route and was
    # stealing our backend traffic (login → 405). This high-priority router
    # pins /api, /ws and /media for OUR host to OUR web container (which proxies
    # them to the gateway), so it always wins over the other app's /api route.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.souq-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/media`))"
      - "traefik.http.routers.souq-api.priority=5000"
      - "traefik.http.routers.souq-api.entrypoints=websecure"
      - "traefik.http.routers.souq-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.souq-api.service=souq-api-svc"
      - "traefik.http.services.souq-api-svc.loadbalancer.server.port=80"

  # ---------------- internal API gateway ----------------
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./backend/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - media-data:/var/www/media:ro
    depends_on: [auth, vendor, catalog]
    restart: unless-stopped
    networks: [souq-net]

  # ---------------- Auth ----------------
  auth:
    build: ./backend/services/auth
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},gateway,localhost
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
      TZ: ${TZ:-Africa/Cairo}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_HOST: auth-db
      DB_PORT: "5432"
    depends_on:
      auth-db: { condition: service_healthy }
    restart: unless-stopped
    networks: [souq-net]

  auth-db:
    image: postgres:16-alpine
    # Self-healing password: always re-sync the role password with the env on
    # boot, so a stale volume can never cause "password authentication failed".
    entrypoint: ["sh", "/usr/local/bin/ensure-password.sh"]
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./backend/db/ensure-password.sh:/usr/local/bin/ensure-password.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------- Vendor ----------------
  vendor:
    build: ./backend/services/vendor
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},gateway,localhost
      TZ: ${TZ:-Africa/Cairo}
      DB_NAME: ${VENDOR_DB_NAME}
      DB_USER: ${VENDOR_DB_USER}
      DB_PASSWORD: ${VENDOR_DB_PASSWORD}
      DB_HOST: vendor-db
      DB_PORT: "5432"
    depends_on:
      vendor-db: { condition: service_healthy }
    restart: unless-stopped
    networks: [souq-net]

  vendor-db:
    image: postgres:16-alpine
    entrypoint: ["sh", "/usr/local/bin/ensure-password.sh"]
    environment:
      POSTGRES_DB: ${VENDOR_DB_NAME}
      POSTGRES_USER: ${VENDOR_DB_USER}
      POSTGRES_PASSWORD: ${VENDOR_DB_PASSWORD}
    volumes:
      - vendor-db-data:/var/lib/postgresql/data
      - ./backend/db/ensure-password.sh:/usr/local/bin/ensure-password.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VENDOR_DB_USER} -d ${VENDOR_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------- Catalog (ASGI / WebSockets) ----------------
  catalog:
    build: ./backend/services/catalog
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},gateway,localhost
      TZ: ${TZ:-Africa/Cairo}
      DB_NAME: ${CATALOG_DB_NAME}
      DB_USER: ${CATALOG_DB_USER}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      DB_HOST: catalog-db
      DB_PORT: "5432"
      MEDIA_ROOT: /app/media
      REDIS_URL: redis://redis:6379/1
    volumes:
      - media-data:/app/media
    depends_on:
      catalog-db: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [souq-net]

  catalog-db:
    image: postgres:16-alpine
    entrypoint: ["sh", "/usr/local/bin/ensure-password.sh"]
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME}
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
      - ./backend/db/ensure-password.sh:/usr/local/bin/ensure-password.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------- shared infra ----------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  rabbitmq:
    image: rabbitmq:3.13-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes: [rabbitmq-data:/var/lib/rabbitmq]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

volumes:
  auth-db-data:
  vendor-db-data:
  catalog-db-data:
  media-data:
  redis-data:
  rabbitmq-data:

networks:
  souq-net:
    driver: bridge
  # Provided by Dokploy (Traefik lives here). Must already exist.
  dokploy-network:
    external: true
