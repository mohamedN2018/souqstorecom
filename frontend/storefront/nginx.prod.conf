# Production storefront: serves the built Vue SPA and proxies API/WS/media to the
# gateway — so the whole app lives on ONE domain (no CORS, single TLS cert).
#
# NOTE: `map` is an http-context directive — it MUST live outside `server {}`.
# This file is included inside nginx's http{} block (conf.d/*.conf), so a bare
# `map` here is valid; putting it inside server{} makes nginx fail to start.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Re-resolve the gateway at request time (survives container restarts).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway gateway;

    # ── Brand-unique, collision-proof backend namespace ──────────────────────
    # The shared platform edge hijacks generic paths (/api, /ws, /media, /gw)
    # for OTHER apps. So we expose the backend under "/sqstore/*" — names no
    # other app uses — and rewrite to the gateway's real paths internally.
    #   /sqstore/v1/...        → /api/v1/...   (REST API)
    #   /sqstore/rt/products/  → /ws/products/ (WebSocket / realtime)
    #   /sqstore/im/x.jpg      → /media/x.jpg  (images)

    # REST API
    location /sqstore/v1/ {
        rewrite            ^/sqstore/v1/(.*)$ /api/v1/$1 break;
        proxy_pass         http://$gateway:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "no-store" always;
    }

    # Realtime WebSocket
    location /sqstore/rt/ {
        rewrite            ^/sqstore/rt/(.*)$ /ws/$1 break;
        proxy_pass         http://$gateway:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Images / media
    location /sqstore/im/ {
        rewrite            ^/sqstore/im/(.*)$ /media/$1 break;
        proxy_pass         http://$gateway:80;
        proxy_set_header   Host $host;
    }

    # Cache built (hashed) assets aggressively — they're immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback. index.html itself must NOT be cached, so the browser
    # always loads the newest asset references after a redeploy.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
