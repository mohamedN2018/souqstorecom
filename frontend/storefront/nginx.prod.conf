# Production storefront: serves the built Vue SPA and proxies API/WS/media to the
# gateway — so the whole app lives on ONE domain (no CORS, single TLS cert).
#
# NOTE: `map` is an http-context directive — it MUST live outside `server {}`.
# This file is included inside nginx's http{} block (conf.d/*.conf), so a bare
# `map` here is valid; putting it inside server{} makes nginx fail to start.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Re-resolve the gateway at request time (survives container restarts).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway gateway;

    # SINGLE unique backend prefix "/gw" — carries API, WebSocket AND media,
    # because the shared edge hijacks the bare "/api", "/ws" and "/media" paths
    # for another app. We strip "/gw" and forward the rest to the gateway, e.g.
    #   /gw/api/v1/...   → /api/v1/...
    #   /gw/ws/products/ → /ws/products/   (WebSocket)
    #   /gw/media/x.jpg  → /media/x.jpg
    location /gw/ {
        rewrite            ^/gw/(.*)$ /$1 break;
        proxy_pass         http://$gateway:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Cache built assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
