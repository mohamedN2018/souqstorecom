# ============================================================
# SouqStore — Marketplace (Microservices) · development stack
# Usage:  cp .env.example .env  &&  docker compose up --build
# ============================================================

services:
  # ---------------------------------------------------------
  # API Gateway — single entrypoint, routes to each service
  # ---------------------------------------------------------
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # Auth / Identity service
  # ---------------------------------------------------------
  auth:
    build: ./services/auth
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: ${TZ}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_HOST: auth-db
      DB_PORT: "5432"
    volumes:
      # Dev convenience: live code reload + migrations written back to host.
      # Remove this mount in production (code is baked into the image).
      - ./services/auth:/app
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped
    networks: [souq-net]

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # Shared infra (used by multiple services as they come online)
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "15672:15672"   # management UI (dev only)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---- Optional infra (enabled with: docker compose --profile full up) ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    profiles: ["full"]
    environment:
      MEILI_ENV: development
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped
    networks: [souq-net]

  minio:
    image: minio/minio:latest
    profiles: ["full"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"   # console (dev only)
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks: [souq-net]

volumes:
  auth-db-data:
  redis-data:
  rabbitmq-data:
  meili-data:
  minio-data:

networks:
  souq-net:
    driver: bridge
