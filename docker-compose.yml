# ============================================================
# SouqStore — Marketplace (Microservices) · development stack
# Usage:  cp .env.example .env  &&  docker compose up --build
#
# Ports are deliberately uncommon to avoid clashing with other local stacks:
#   Frontend (Vue) ....... http://localhost:5280
#   API Gateway .......... http://localhost:18080
#   RabbitMQ console ..... http://localhost:15673
#   MinIO console ........ http://localhost:19001  (profile: full)
# ============================================================

services:
  # ---------------------------------------------------------
  # Frontend — Vue 3 + Vite + Tailwind + GSAP (storefront)
  # ---------------------------------------------------------
  frontend:
    build: ./frontend/storefront
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      # Vite proxies /api and /media to the gateway (see vite.config.js)
      GATEWAY_URL: http://gateway:80
    volumes:
      - ./frontend/storefront:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5280:5173"
    depends_on:
      - gateway
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # API Gateway — single entrypoint, routes to each service
  # ---------------------------------------------------------
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "18080:80"
    volumes:
      - ./backend/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - media-data:/var/www/media:ro
    depends_on:
      - auth
      - vendor
      - catalog
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # Auth / Identity service
  # ---------------------------------------------------------
  auth:
    build: ./backend/services/auth
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      TZ: ${TZ}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_HOST: auth-db
      DB_PORT: "5432"
    volumes:
      - ./backend/services/auth:/app
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped
    networks: [souq-net]

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # Vendor / Store service
  # ---------------------------------------------------------
  vendor:
    build: ./backend/services/vendor
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      TZ: ${TZ}
      DB_NAME: ${VENDOR_DB_NAME}
      DB_USER: ${VENDOR_DB_USER}
      DB_PASSWORD: ${VENDOR_DB_PASSWORD}
      DB_HOST: vendor-db
      DB_PORT: "5432"
    volumes:
      - ./backend/services/vendor:/app
    depends_on:
      vendor-db:
        condition: service_healthy
    restart: unless-stopped
    networks: [souq-net]

  vendor-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${VENDOR_DB_NAME}
      POSTGRES_USER: ${VENDOR_DB_USER}
      POSTGRES_PASSWORD: ${VENDOR_DB_PASSWORD}
    volumes:
      - vendor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VENDOR_DB_USER} -d ${VENDOR_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # Catalog service (writes generated images into media-data)
  # ---------------------------------------------------------
  catalog:
    build: ./backend/services/catalog
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      TZ: ${TZ}
      DB_NAME: ${CATALOG_DB_NAME}
      DB_USER: ${CATALOG_DB_USER}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      DB_HOST: catalog-db
      DB_PORT: "5432"
      MEDIA_ROOT: /app/media
    volumes:
      - ./backend/services/catalog:/app
      - media-data:/app/media
    depends_on:
      catalog-db:
        condition: service_healthy
    restart: unless-stopped
    networks: [souq-net]

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME}
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---------------------------------------------------------
  # Shared infra
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [souq-net]

  # ---- Optional infra (docker compose --profile full up) ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    profiles: ["full"]
    environment:
      MEILI_ENV: development
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped
    networks: [souq-net]

  minio:
    image: minio/minio:latest
    profiles: ["full"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks: [souq-net]

volumes:
  auth-db-data:
  vendor-db-data:
  catalog-db-data:
  media-data:
  redis-data:
  rabbitmq-data:
  meili-data:
  minio-data:
  frontend-node-modules:

networks:
  souq-net:
    driver: bridge
