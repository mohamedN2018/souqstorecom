worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ---- Rate limiting (basic DoS / abuse protection at the edge) ----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # ---- Upstreams: one per microservice ----
    # As new services come online, add an upstream + location block here.
    upstream auth_service {
        server auth:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        # Health endpoint for the gateway itself
        location = /healthz {
            access_log off;
            return 200 "gateway ok\n";
            add_header Content-Type text/plain;
        }

        # ---- Auth / Identity service ----
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Auth service API docs (dev convenience)
        location /api/docs/auth/ {
            proxy_pass http://auth_service/api/docs/;
            proxy_set_header Host $host;
        }

        # ---- Placeholder routes for upcoming services ----
        # location /api/v1/catalog/  { proxy_pass http://catalog_service; ... }
        # location /api/v1/orders/   { proxy_pass http://order_service;   ... }
        # location /api/v1/payments/ { proxy_pass http://payment_service; ... }
    }
}
